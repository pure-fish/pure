# filepath: pure/pure/.github/workflows/_social-network.yml
name: Post Release Notes

on:
# trigger this workflow when a new release is created
  release:
    types: [published]
  workflow_call:
    inputs:
      release_body:
        description: 'The body of the release notes'
        required: false
        type: string
      release_tag:
        description: 'The tag of the release (e.g., v1.0.0)'
        required: false
        type: string
    secrets:
      PERSONAL_BLUESKY_TOKEN:
        required: true
      PERSONAL_MASTODON_TOKEN_PIAILLE:
        required: true
  workflow_dispatch:
    inputs:
      release_body:
        description: 'The body of the release notes'
        required: false
        type: string
        default: ''
      release_tag:
        description: 'The tag of the release'
        required: false
        type: string
        default: ''

jobs:
  post-release-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare release body
        id: prepare_body
        env:
          RELEASE_BODY: ${{ inputs.release_body || github.event.release.body }}
        run: |
          # Use environment variable to safely handle multiline content
          # Truncate to 200 characters (approximating graphemes)
          if [ ${#RELEASE_BODY} -gt 200 ]; then
            TRUNCATED_BODY="${RELEASE_BODY:0:180}…"
          else
            TRUNCATED_BODY="$RELEASE_BODY"
          fi
          echo "truncated_body<<EOF" >> $GITHUB_OUTPUT
          echo "$TRUNCATED_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Grab image from release body
        id: grab_image
        env:
          RELEASE_BODY: ${{ inputs.release_body || github.event.release.body }}
        run: |
            # Extract src URLs and alt values
            URLS=$(echo "$RELEASE_BODY" | grep -oP '<img[^>]+src="\K[^"]+' | paste -sd',')
            ALTS=$(echo "$RELEASE_BODY" | grep -oP '<img[^>]+alt="\K[^"]+' | paste -sd',')

            # Download images into workspace using relative paths (Docker actions mount GITHUB_WORKSPACE, not /tmp)
            mkdir -p ".release-images"
            LOCAL_PATHS=""
            IFS=',' read -ra URL_LIST <<< "$URLS"
            for url in "${URL_LIST[@]}"; do
              filename="${url##*/}.png" 
              curl -sSL "$url" -o ".release-images/$filename"
              LOCAL_PATHS="${LOCAL_PATHS:+$LOCAL_PATHS,}.release-images/$filename"
              ls -lah ".release-images/$filename"
            done

            echo "image_paths=$LOCAL_PATHS" | tee -a "$GITHUB_OUTPUT"
            echo "image_alt_texts=$ALTS" | tee -a "$GITHUB_OUTPUT"

      - name: Send post to Bluesky
        id: post2bluesky
        uses: cbrgm/bluesky-github-action@v1 # https://github.com/marketplace/actions/bluesky-send-post
        with:
          handle: "edouard-lopez.com" # Your handle (example: username.bsky.social)
          password: ${{ secrets.PERSONAL_BLUESKY_TOKEN }} # Your Bluesky app token
          text: |
            🐟 New Pure ${{ inputs.release_tag || github.event.release.tag_name }}!
            See https://github.com/pure-fish/pure/releases/tag/${{ inputs.release_tag || github.event.release.tag_name }}
            
            ${{ steps.prepare_body.outputs.truncated_body }}
            #fish #shell #release
          lang: "en"
          image-paths: ${{ steps.grab_image.outputs.image_paths }} # Comma-separated list of image paths to include in the post
          image-alt-texts: ${{ steps.grab_image.outputs.image_alt_texts }} # Comma-separated list of image alt texts

      - name: Post to Mastodon (Piaille.fr)
        id: post2paille
        uses: cbrgm/mastodon-github-action@v2 # https://github.com/marketplace/actions/post-to-mastodon
        env:
          MASTODON_URL: "https://piaille.fr" # Mastodon instance URL, e.g., https://example.social.
          MASTODON_TOKEN: ${{ secrets.PERSONAL_MASTODON_TOKEN_PIAILLE }} # Mastodon access token for authentication.
        with:
          access-token: ${{ env.MASTODON_TOKEN }} # Mastodon access token for authentication.
          url: ${{ env.MASTODON_URL }}
          message: |
            🐟 New Pure ${{ inputs.release_tag || github.event.release.tag_name }}!
            See https://github.com/pure-fish/pure/releases/tag/${{ inputs.release_tag || github.event.release.tag_name }}
            
            ${{ steps.prepare_body.outputs.truncated_body }}
            #fish #shell #release
          language: "en"
          image-paths: ${{ steps.grab_image.outputs.image_paths }} # Comma-separated list of image paths to include in the post
          image-alt-texts: ${{ steps.grab_image.outputs.image_alt_texts }} # Comma-separated list of image alt texts
